<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="css/styles2.css">

    <script src="js/functions.js" defer></script>
    <title>TIENDA ADIDAS</title>
</head>

<body>
    <header class="header">
      <div class="header__icon"><img class="header__icon--menu " src="img/icono_menu-removebg-preview.png" alt="Icono Menu"></div>
      <img class="logo" src="img/adidasLogosinfondo.png" alt="Logo Adidas">
      <div class="header__icon ">
        <img  class="header__icon--menu " src="img/cart-removebg-preview.png" alt="Icono de Carrito">
        <span class="headerIconCart" id="span">0</span>
      </div>
    </header>

    <main>
          <section class="banner" >
           <article class="banner__description">
            <h2 class="banner__description--title">Productos Nuevos</h2>
            <p class="banner__description--subtitle">Conoce nuestros productos nuevos</p>
           </article>
      </section>

      <section class="products logo"  >
        
            <article class="products__article mouse" >
            <img>
            
            
            </article>

            
            


              <div class="shop-container">
                
                <div id="productos-lista"></div>
              </div>
              
      </section>
        <div id="flyer" class="flyer"></div>
      <section class="cart">
        <i class="closeCart"><img src="img/close.png" alt="close menu"></i>
          <h2 class="cart__title">CARRITO</h2>
           
          

          <div class="cart-container">
              
              <ul id="carrito-lista"></ul>
              
          </div>

            <p class="cart__total">Total: $<span id="total-precio">0</span></p>
          <div class="divButton"><button class="cart__button">Comprar</button> </div>
          

      </section>

      <section class ="menu">
        <i class="close"><img src="img/close.png" alt="close menu"></i>
        <article><p>Inicio</p></article>
        <article><p>Nosotros</p></article>
        <article><p>Carrito</p></article>
      </section>

     </main>
</body>
</html>
